# ============================================================================
# Smart Faculty & Lab Availability Tracking System - Application Config
# ============================================================================

spring.application.name=faculty-tracker

# ---- Server ----
server.port=8080

# ---- Database (H2 for local development) ----
spring.datasource.url=jdbc:h2:mem:facultytracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ---- JPA session ----
# Kept open for the request lifecycle so lazy associations (e.g. Faculty ->
# Department) can be read in the service layer when mapping to DTOs, even
# in methods that aren't explicitly @Transactional. Spring Boot defaults
# this to true anyway; set explicitly to silence the startup warning.
spring.jpa.open-in-view=true

# ---- JWT ----
# 256-bit (32+ char) secret used to sign tokens. CHANGE THIS for production
# and load it from an environment variable instead.
app.jwt.secret=ChangeThisFacultyTrackerJwtSecretKeyToSomethingLongAndRandom123!
app.jwt.expiration-ms=86400000

# ---- CORS ----
app.cors.allowed-origins=http://localhost:5173

# ---- Logging ----
logging.level.com.facultytracker=INFO
logging.level.org.springframework.security=WARN
